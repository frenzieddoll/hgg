synopsis:             DataFrame 抽象 (class PlotData) + df |>> spec バインド for hgg
description:
    hgg を「データフレーム + 列名」 で書くための df 非依存抽象。
    .
    * 'PlotData' — 任意の df 型を 'Resolver' (列名 → ColData) に橋渡しする typeclass。
      'Map'/assoc-list のゼロ依存 instance を同梱 (df ライブラリ無しでも使える)。
    * '(|>>)' — df を spec にバインドし 'BoundPlot' を作る演算子。
      (Hackage @dataframe@ が @|>@ を占有するため @|>>@ を採用)
    .
    描画ラッパ (saveSVGBound 等) は backend package (hgg-svg) 側に置く
    ため、 本 package は core のみに依存する (analyze 非依存)。
    Phase 14 (proposal spec-2 「DataFrame 統合」) の実体。

