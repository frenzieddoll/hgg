synopsis:
    Layer 1-3 of hgg: VisualSpec / PlotData / Layout / Render primitives

description:
    hgg の OSS 核。 backend 非依存の VisualSpec ADT、 PlotData (Vector
    ベース)、 Layout 計算 (純粋関数)、 Renderer 抽象 (Primitive 列) を提供する。
    .
    Phase 26 §A 「hgg-core 設計と Layer 1-3 実装」 の実体。
    依存は base / vector / text / containers のみに抑え、 backend (SVG / PDF /
    Rasterific / Canvas) は別 package で実装。

